# Production-oriented stack (reference — adjust for your environment).
# Dev docker-compose.yml is unchanged. Use explicitly:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Excludes: pgAdmin, RedisInsight, Mailpit, MinIO console, Vite dev server.
# Assumes: code + built assets live under ./src (deploy.sh runs composer + npm build on host).

name: al-injaz-prod

x-app-env: &app-env
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: ${APP_URL:-https://example.com}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-al_injaz}
  DB_USERNAME: ${DB_USERNAME:-al_injaz}
  DB_PASSWORD: ${DB_PASSWORD}
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  BROADCAST_CONNECTION: reverb
  REVERB_HOST: reverb
  REVERB_PORT: "8080"
  REVERB_SCHEME: http
  REVERB_SERVER_HOST: 0.0.0.0
  REVERB_SERVER_PORT: "8080"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alinjaz_prod_app
    restart: always
    working_dir: /var/www/html
    env_file:
      - .env.production
    environment:
      <<: *app-env
    volumes:
      - ./src:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(0);'"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: nginx:1.27-alpine
    container_name: alinjaz_prod_web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html:ro
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - reverb
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/up >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: alinjaz_prod_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-al_injaz}
      POSTGRES_USER: ${DB_USERNAME:-al_injaz}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: alinjaz_prod_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alinjaz_prod_horizon
    restart: always
    working_dir: /var/www/html
    env_file:
      - .env.production
    environment:
      <<: *app-env
    volumes:
      - ./src:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -lc "php artisan horizon"

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alinjaz_prod_scheduler
    restart: always
    working_dir: /var/www/html
    env_file:
      - .env.production
    environment:
      <<: *app-env
    volumes:
      - ./src:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -lc "php artisan schedule:work"

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alinjaz_prod_reverb
    restart: always
    working_dir: /var/www/html
    ports:
      - "8080:8080"
    env_file:
      - .env.production
    environment:
      <<: *app-env
    volumes:
      - ./src:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "exec php artisan reverb:start --host=0.0.0.0 --port=8080 --hostname=$${REVERB_SERVER_HOSTNAME:-localhost}"

volumes:
  postgres_prod_data:
  redis_prod_data:
  app_storage:
